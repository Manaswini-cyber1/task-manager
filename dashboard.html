<!DOCTYPE html>
<html>
<head>
    <title>TaskFlow - Smart Scheduler</title>
    
    <!-- Chart.js for graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        
        /* Animated floating shapes */
        .shape {
            position: fixed;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        
        .shape-1 { width: 300px; height: 300px; top: -100px; left: -100px; animation: float 20s infinite; }
        .shape-2 { width: 200px; height: 200px; bottom: 50px; right: 50px; animation: float 25s infinite reverse; background: rgba(255, 255, 255, 0.15); }
        .shape-3 { width: 150px; height: 150px; top: 40%; left: 80%; animation: float 18s infinite; }
        .shape-4 { width: 400px; height: 400px; bottom: -150px; left: 20%; animation: float 30s infinite; background: rgba(255, 255, 255, 0.05); }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-40px) rotate(10deg); }
        }
        
        .dashboard {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 25px 35px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .logo h1 {
            font-size: 32px;
            font-weight: 800;
            background: rgba(0, 0, 0, 0.4);
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            color: #FFD166;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
        
        .logo p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            margin-top: 8px;
        }
        
        .live-clock {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 24px;
            border-radius: 50px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .clock-time {
            font-size: 28px;
            font-weight: bold;
            color: #FFD166;
            font-family: monospace;
        }
        
        .clock-date {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
        }
        
        .stat-icon {
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .stat-info h3 {
            font-size: 28px;
            color: white;
            font-weight: bold;
        }
        
        .stat-info p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
        }
        
        /* Single Chart Row */
        .chart-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            margin-bottom: 25px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .chart-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }
        
        .chart-card:hover {
            transform: scale(1.02);
        }
        
        .chart-title {
            font-size: 20px;
            font-weight: bold;
            color: white;
            margin-bottom: 20px;
        }
        
        canvas {
            max-height: 250px;
            max-width: 250px;
            margin: 0 auto;
        }
        
        /* Add Task Section */
        .add-task-section {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .section-title {
            color: white;
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .input-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .task-input {
            flex: 2;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            font-size: 16px;
            color: white;
        }
        
        .task-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .task-input:focus {
            outline: none;
            border-color: #FFD166;
        }
        
        .time-input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            font-size: 16px;
            color: white;
            cursor: pointer;
        }
        
        .time-input::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
        
        .add-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .add-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }
        
        /* Tasks Section */
        .tasks-section {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-buttons {
            display: flex;
            gap: 10px;
        }
        
        .filter-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-btn.active, .filter-btn:hover {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: white;
        }
        
        .task-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .task-list::-webkit-scrollbar {
            width: 5px;
        }
        
        .task-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        
        .task-list::-webkit-scrollbar-thumb {
            background: #FF6B6B;
            border-radius: 10px;
        }
        
        .task-item {
            background: rgba(255, 255, 255, 0.1);
            margin: 12px 0;
            padding: 18px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            transition: all 0.3s;
            border-left: 3px solid #FFD166;
        }
        
        .task-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }
        
        .task-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 2;
        }
        
        .task-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #4ECDC4;
        }
        
        .task-details {
            flex: 1;
        }
        
        .task-name {
            font-size: 16px;
            color: white;
            margin-bottom: 5px;
        }
        
        .task-name.completed {
            text-decoration: line-through;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .task-time-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #FFD166;
        }
        
        .no-time-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .delete-btn {
            background: rgba(255, 107, 107, 0.8);
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .delete-btn:hover {
            background: #ff6b6b;
            transform: scale(1.02);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        /* Reminder Popup */
        .reminder-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #FFD166, #FF6B6B);
            padding: 15px 25px;
            border-radius: 20px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @media (max-width: 900px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .input-row {
                flex-direction: column;
            }
            .header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

<!-- Floating Background Shapes -->
<div class="shape shape-1"></div>
<div class="shape shape-2"></div>
<div class="shape shape-3"></div>
<div class="shape shape-4"></div>

<div class="dashboard">
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <h1>📅 TaskFlow Scheduler</h1>
            <p>Schedule, Remind, Complete - Stay Productive</p>
        </div>
        <div class="live-clock">
            <div class="clock-time" id="currentTime">--:--:--</div>
            <div class="clock-date" id="currentDate">Loading...</div>
        </div>
    </div>
    
    <!-- Stats Cards -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">📋</div>
            <div class="stat-info">
                <h3 id="totalTasks">0</h3>
                <p>Total Tasks</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">✅</div>
            <div class="stat-info">
                <h3 id="completedTasks">0</h3>
                <p>Completed</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⏳</div>
            <div class="stat-info">
                <h3 id="pendingTasks">0</h3>
                <p>Pending</p>
            </div>
        </div>
    </div>
    
    <!-- Single Chart - Task Distribution -->
    <div class="chart-row">
        <div class="chart-card">
            <div class="chart-title">📊 Task Distribution</div>
            <canvas id="donutChart"></canvas>
        </div>
    </div>
    
    <!-- Add Task Section -->
    <div class="add-task-section">
        <div class="section-title">
            <span>➕</span> Add New Task
        </div>
        <div class="input-row">
            <input type="text" class="task-input" id="taskInput" placeholder="What needs to be done?">
            <input type="time" class="time-input" id="taskTime" placeholder="Set time (optional)">
            <button class="add-btn" onclick="addTask()">Add Task →</button>
        </div>
        <div style="font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 10px;">
            ⏰ Time is optional. Leave empty to create task without reminder.
        </div>
    </div>
    
    <!-- Tasks Section -->
    <div class="tasks-section">
        <div class="tasks-header">
            <div class="section-title" style="margin-bottom: 0;">
                <span>📝</span> Your Tasks
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterTasks('all', this)">All</button>
                <button class="filter-btn" onclick="filterTasks('pending', this)">Pending</button>
                <button class="filter-btn" onclick="filterTasks('completed', this)">Completed</button>
            </div>
        </div>
        <ul class="task-list" id="taskList"></ul>
    </div>
</div>

<script>
    let allTasks = [];
    let currentFilter = 'all';
    let donutChart;
    
    // Clock Function
    function updateClock() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('currentTime').innerHTML = `${hours}:${minutes}:${seconds}`;
        
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerHTML = now.toLocaleDateString('en-US', options);
        
        checkReminders();
    }
    
    function checkReminders() {
        const now = new Date();
        const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        
        allTasks.forEach(task => {
            if (task.time && task.time === currentTime && !task.reminded && !task.completed) {
                showReminderToast(task.text, task.time);
                task.reminded = true;
                fetch(`http://localhost:3000/task/${task._id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ reminded: true })
                });
            }
        });
    }
    
    function showReminderToast(text, time) {
        const toast = document.createElement('div');
        toast.className = 'reminder-toast';
        toast.innerHTML = `
            <strong>🔔 Time's Up!</strong><br>
            Task: ${text}<br>
            Scheduled: ${time}
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 5000);
    }
    
    async function addTask() {
        let text = document.getElementById("taskInput").value;
        let time = document.getElementById("taskTime").value;
        
        if (!text.trim()) {
            alert("Please enter a task!");
            return;
        }
        
        const taskData = { 
            text: text, 
            time: time || null,
            completed: false, 
            reminded: false 
        };
        
        await fetch("http://localhost:3000/task", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(taskData)
        });
        
        document.getElementById("taskInput").value = "";
        document.getElementById("taskTime").value = "";
        loadTasks();
    }
    
    async function loadTasks() {
        let res = await fetch("http://localhost:3000/tasks");
        allTasks = await res.json();
        updateStats();
        updateChart();
        displayTasks();
    }
    
    function updateStats() {
        const total = allTasks.length;
        const completed = allTasks.filter(t => t.completed).length;
        const pending = total - completed;
        
        document.getElementById('totalTasks').innerHTML = total;
        document.getElementById('completedTasks').innerHTML = completed;
        document.getElementById('pendingTasks').innerHTML = pending;
    }
    
    function updateChart() {
        const completed = allTasks.filter(t => t.completed).length;
        const pending = allTasks.length - completed;
        
        if (donutChart) donutChart.destroy();
        
        donutChart = new Chart(document.getElementById('donutChart'), {
            type: 'doughnut',
            data: {
                labels: ['Completed', 'Pending'],
                datasets: [{
                    data: [completed, pending],
                    backgroundColor: ['#4ECDC4', '#FF6B6B'],
                    borderWidth: 0,
                    hoverOffset: 15
                }]
            },
            options: { 
                responsive: true, 
                plugins: { 
                    legend: { 
                        position: 'bottom', 
                        labels: { color: 'white', font: { size: 14 } } 
                    }
                }
            }
        });
    }
    
    function displayTasks() {
        let filtered = allTasks;
        if (currentFilter === 'pending') filtered = allTasks.filter(t => !t.completed);
        if (currentFilter === 'completed') filtered = allTasks.filter(t => t.completed);
        
        filtered.sort((a, b) => {
            if (!a.time && !b.time) return 0;
            if (!a.time) return 1;
            if (!b.time) return -1;
            return a.time.localeCompare(b.time);
        });
        
        const list = document.getElementById('taskList');
        if (filtered.length === 0) {
            list.innerHTML = '<div class="empty-state">✨ No tasks yet. Add one above!</div>';
            return;
        }
        
        list.innerHTML = filtered.map(task => `
            <li class="task-item">
                <div class="task-info">
                    <input type="checkbox" class="task-checkbox" 
                           ${task.completed ? 'checked' : ''} 
                           onchange="toggleTask('${task._id}', this.checked)">
                    <div class="task-details">
                        <div class="task-name ${task.completed ? 'completed' : ''}">${escapeHtml(task.text)}</div>
                        ${task.time ? 
                            `<div class="task-time-badge">⏰ ${task.time}</div>` : 
                            `<div class="no-time-badge">📅 No time set</div>`
                        }
                    </div>
                </div>
                <button class="delete-btn" onclick="deleteTask('${task._id}')">Delete</button>
            </li>
        `).join('');
    }
    
    async function toggleTask(id, completed) {
        await fetch(`http://localhost:3000/task/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ completed })
        });
        loadTasks();
    }
    
    async function deleteTask(id) {
        if (confirm('Delete this task?')) {
            await fetch(`http://localhost:3000/task/${id}`, { method: "DELETE" });
            loadTasks();
        }
    }
    
    function filterTasks(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        displayTasks();
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    updateClock();
    setInterval(updateClock, 1000);
    loadTasks();
</script>

</body>
</html>
